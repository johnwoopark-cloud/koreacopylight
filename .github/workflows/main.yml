name: Daily News Update

on:
  schedule:
    # 한국 시간(KST) 오전 8시 55분은 세계 표준시(UTC)로 전날 23시 55분입니다.
    - cron: '55 23 * * *'
  workflow_dispatch: # 버튼을 눌러 수동으로도 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 필요한 라이브러리 설치
        run: |
          pip install requests

      - name: 뉴스 수집 스크립트 실행 (koreacopylight.py)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python koreacopylight.py

      - name: 변경된 데이터 저장(Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json
          git commit -m "Update news data: $(date +'%Y-%m-%d')" || exit 0
          git push
