<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>법률 저작권 뉴스 모니터링</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --header-bg: #2c3e50; 
            --text-main: #333;
            --text-sub: #666;
            --accent: #e67e22; /* 비슷한 뉴스 강조색 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 40px;
            color: #222;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }

        .news-card:hover {
            transform: translateY(-4px);
        }

        /* 제목 영역 */
        .card-header-text {
            background: var(--header-bg);
            padding: 22px 20px;
            min-height: 70px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .header-title-link {
            color: #fff;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.4;
            padding-right: 35px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .bookmark-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .card-body {
            padding: 18px 20px;
            flex-grow: 1;
        }

        .news-desc {
            font-size: 0.92rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 하단 푸터: 비슷한 뉴스(좌) + 날짜(우) */
        .news-footer {
            padding: 12px 20px;
            background: #fdfdfd;
            border-top: 1px solid #f1f1f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .similar-tag {
            color: var(--accent);
            font-weight: 600;
        }

        .pub-date {
            color: #aaa;
        }

        #my-list-section {
            max-width: 1100px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #f7f7f7;
        }

        .saved-link {
            text-decoration: none;
            color: #444;
            font-size: 0.9rem;
            flex: 1;
        }

        .del-btn {
            background: #f1f1f1;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 10px;
            color: #888;
        }
    </style>
</head>
<body>

<h1>⚖️ 법률 저작권 뉴스 모니터링</h1>

<div class="news-grid" id="news-list"></div>

<div id="my-list-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin:0;">📌 나중에 읽을 뉴스</h3>
        <button onclick="clearAll()" style="background:none; border:none; color:#bbb; cursor:pointer; font-size:0.8rem;">전체 삭제</button>
    </div>
    <div id="saved-items-container"></div>
</div>

<script>
    let newsData = [];

    window.onload = function() {
        loadNews();
        loadSavedList();
    };

    function formatKoreanDate(dateStr) {
        const date = new Date(dateStr);
        if (isNaN(date)) return dateStr;
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}년 ${month}월 ${day}일 ${hours}시 ${minutes}분`;
    }

    function loadNews() {
        fetch('news_data.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                newsData = data;
                displayNews(data);
            })
            .catch(err => {
                document.getElementById('news-list').innerHTML = '<p style="text-align:center; grid-column:1/-1;">뉴스를 불러올 수 없습니다.</p>';
            });
    }

    function displayNews(items) {
        const container = document.getElementById('news-list');
        container.innerHTML = '';

        items.forEach((item, index) => {
            const similarCount = item.similar_count || 0;
            // 비슷한 뉴스가 있을 때만 표시할 HTML 구성
            const similarHtml = similarCount > 0 
                ? `<span class="similar-tag">🔗 비슷한 뉴스 ${similarCount}개</span>` 
                : `<span></span>`;

            const card = document.createElement('div');
            card.className = 'news-card';
            
            card.innerHTML = `
                <div class="card-header-text">
                    <a href="${item.link}" target="_blank" class="header-title-link">${item.title}</a>
                    <button class="bookmark-btn" onclick="saveToMyList(${index})">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M2 2v13.5l5.223-2.815 5.223 2.815V2a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/>
                        </svg>
                    </button>
                </div>
                <div class="card-body">
                    <p class="news-desc">${item.description}</p>
                </div>
                <div class="news-footer">
                    ${similarHtml}
                    <span class="pub-date">${formatKoreanDate(item.pubDate)}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function saveToMyList(index) {
        const item = newsData[index];
        let currentSaved = JSON.parse(localStorage.getItem('myNewsList')) || [];
        if (!currentSaved.some(saved => saved.link === item.link)) {
            currentSaved.push({
                title: item.title,
                link: item.link,
                date: formatKoreanDate(item.pubDate)
            });
            localStorage.setItem('myNewsList', JSON.stringify(currentSaved));
            loadSavedList();
            alert('저장되었습니다.');
        } else {
            alert('이미 저장된 뉴스입니다.');
        }
    }

    function loadSavedList() {
        const savedContainer = document.getElementById('saved-items-container');
        const currentSaved = JSON.parse(localStorage.getItem('myNewsList')) || [];
        if (currentSaved.length === 0) {
            savedContainer.innerHTML = '<p style="color:#ccc; text-align:center; padding:10px;">저장된 리스트가 비어 있습니다.</p>';
            return;
        }
        savedContainer.innerHTML = currentSaved.map((item, idx) => `
            <div class="saved-item">
                <a href="${item.link}" target="_blank" class="saved-link">
                    <strong>[${item.date}]</strong> ${item.title}
                </a>
                <button class="del-btn" onclick="deleteItem(${idx})">삭제</button>
            </div>
        `).join('');
    }

    function deleteItem(idx) {
        let currentSaved = JSON.parse(localStorage.getItem('myNewsList')) || [];
        currentSaved.splice(idx, 1);
        localStorage.setItem('myNewsList', JSON.stringify(currentSaved));
        loadSavedList();
    }

    function clearAll() {
        if(confirm('모든 리스트를 삭제하시겠습니까?')) {
            localStorage.removeItem('myNewsList');
            loadSavedList();
        }
    }
</script>

</body>
</html>
