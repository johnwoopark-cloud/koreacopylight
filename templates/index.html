<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Copyright News Trends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Pretendard', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="py-10 px-4 md:px-20">
    <div class="max-w-6xl mx-auto">
        <!-- 헤더 섹션 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">저작권 동향 <span class="text-blue-600 italic">Report</span></h1>
                <p class="text-gray-500 mt-2">최신 저작권 판례 및 소송 소식을 자동으로 수집합니다.</p>
            </div>
            <button onclick="scrapeNews()" id="updateBtn" class="bg-gray-900 hover:bg-blue-600 text-white px-8 py-3 rounded-lg font-bold transition-all shadow-lg active:scale-95">
                새 소식 가져오기
            </button>
        </div>

        <!-- 뉴스 카드 컨테이너 -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for news in news_list %}
            <div id="card-{{ news.id }}" class="group bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col">
                <div class="p-6 flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">Copyright News</span>
                        <!-- 삭제 버튼 -->
                        <button onclick="deleteNews('{{ news.id }}')" class="text-gray-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                    
                    <a href="{{ news.link }}" target="_blank" class="block">
                        <h2 class="text-xl font-bold text-gray-800 mb-3 group-hover:text-blue-600 transition-colors leading-snug line-clamp-2">
                            {{ news.title }}
                        </h2>
                    </a>
                    <p class="text-gray-500 text-sm leading-relaxed line-clamp-3">
                        {{ news.description }}
                    </p>
                </div>
                
                <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center rounded-b-xl">
                    <span class="text-xs text-gray-400 font-medium">{{ news.pubDate }}</span>
                    {% if news.similar_count > 0 %}
                    <span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-1 rounded-full font-bold">유사 {{ news.similar_count }}건</span>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        async function scrapeNews() {
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerText = "데이터 수집 중...";
            
            const res = await fetch('/scrape');
            if (res.ok) window.location.reload();
        }

        async function deleteNews(newsId) {
            if (!confirm("이 뉴스를 리스트에서 삭제할까요?")) return;
            
            const res = await fetch(`/delete/${newsId}`, { method: 'POST' });
            if (res.ok) {
                const card = document.getElementById(`card-${newsId}`);
                card.classList.add('opacity-0', 'scale-95');
                setTimeout(() => card.remove(), 300);
            }
        }
    </script>
</body>
</html>
