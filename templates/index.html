<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Copyright Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f9fafb; font-family: 'Pretendard', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="py-12 px-6">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 border-b border-gray-200 pb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tighter">Copyright <span class="text-blue-600">Trends</span></h1>
            <p class="text-gray-500 mt-2 text-sm">페이지를 열 때마다 최신 저작권 소식을 가져옵니다.</p>
        </header>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for news in news_list %}
            <div id="card-{{ news.id }}" class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all flex flex-col h-full overflow-hidden">
                <div class="p-6 flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <span class="inline-block bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-1 rounded uppercase">Update</span>
                        <button onclick="deleteNews('{{ news.id }}')" class="text-gray-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                    <a href="{{ news.link }}" target="_blank" class="block group">
                        <h2 class="text-lg font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors line-clamp-2 leading-snug">
                            {{ news.title }}
                        </h2>
                    </a>
                    <p class="text-gray-500 text-xs leading-relaxed line-clamp-3">
                        {{ news.description }}
                    </p>
                </div>
                <div class="px-6 py-4 bg-gray-50/50 flex justify-between items-center text-[11px] text-gray-400">
                    <span>{{ news.pubDate }}</span>
                    {% if news.similar_count > 0 %}
                    <span class="font-bold text-orange-500">+{{ news.similar_count }} similar</span>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        async function deleteNews(newsId) {
            if (!confirm("이 뉴스를 삭제하시겠습니까?")) return;
            const res = await fetch(`/delete/${newsId}`, { method: 'POST' });
            if (res.ok) {
                const card = document.getElementById(`card-${newsId}`);
                card.style.opacity = '0';
                card.style.transform = 'scale(0.95)';
                setTimeout(() => card.remove(), 300);
            }
        }
    </script>
</body>
</html>
